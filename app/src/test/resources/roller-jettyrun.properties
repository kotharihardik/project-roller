# used during mvn jetty:run, not Roller testing (mvn test)

installation.type=auto
planet.aggregator.enabled=true

database.configurationType=jdbc
database.jdbc.driverClass=org.apache.derby.jdbc.ClientDriver
# In-memory Derby database activated via db-utils module
database.jdbc.connectionURL=jdbc:derby://localhost:4224/memory:rollerdb;create=true
database.jdbc.username=app
database.jdbc.password=app

hibernate.dialect=org.hibernate.dialect.DerbyDialect
hibernate.transaction.factory_class=org.hibernate.transaction.JDBCTransactionFactory

#see http://wiki.eclipse.org/EclipseLink/Examples/JPA/Logging
#eclipselink.logging.file=target/eclipselink.log
# OFF, SEVERE, WARNING, INFO, CONFIG, FINE, FINER, ALL
#eclipselink.logging.level=FINER

# use plain text passwords in testing
passwds.encryption.enabled=false

# use src copy of themes for read-only access
themes.dir=${basedir}/../app/src/main/webapp/themes

# put work in work dir
search.index.dir          =${project.build.directory}/work/search-index
uploads.dir               =${project.build.directory}/work/uploadsdir
mediafiles.storage.dir    =${project.build.directory}/work/mediafiles

# don't auto migrate during tests
uploads.migrate.auto=false

# override tasks.enabled so we can add a test task
tasks.enabled=ScheduledEntriesTask,ResetHitCountsTask,PingQueueTask,TestTask

# test task
tasks.TestTask.class=org.apache.roller.weblogger.business.TestTask
tasks.TestTask.startTime=immediate
tasks.TestTask.interval=1800
tasks.TestTask.leaseTime=300

# turn on theme reloading
themes.reload.mode=true

# turn off caching for testing/debugging
cache.sitewide.enabled=false
cache.weblogpage.enabled=false
cache.weblogfeed.enabled=false

# ── Translation service ──────────────────────────────────────────────
# Change 'sarvam' to 'gemini' to switch providers during Jetty run.
translation.provider=sarvam
translation.gemini.apiUrl=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
# API key: set env var GEMINI_API_KEY instead of hardcoding here.
# translation.gemini.apiKey=
translation.gemini.model=${env.TRANSLATION_GEMINI_MODEL:gemini-2.5-flash}
translation.sarvam.apiUrl=${env.TRANSLATION_SARVAM_API_URL}
translation.sarvam.apiKey=${env.SARVAM_API_KEY}
translation.gemini.apiKey=${env.GEMINI_API_KEY}
cache.planet.enabled=false

# ── Chatbot Q&A service ──────────────────────────────────────────────
chatbot.defaultStrategy=rag
chatbot.llm.apiKey=${env.CHATBOT_LLM_API_KEY}
chatbot.llm.apiUrl=${env.CHATBOT_LLM_API_URL}
chatbot.llm.timeoutSeconds=30
chatbot.longcontext.maxChars=800000
chatbot.rag.topK=5
chatbot.rag.chunkSize=1500

# ── Breakdown service ──────────────────────────────────────────────
breakdown.gemini.apiUrl=${ENV.TRANSLATION_GEMINI_API_URL}
breakdown.gemini.apiKey=${env.GEMINI_API_KEY}
# Bug Report Notification Settings
# Enable bug report notifications and email channel
notification.bugreport.enabled=true
notification.email.enabled=true

# Sender address used in notification emails (must be allowed by SMTP)
notification.bugreport.from=hardikkothari300@gmail.com

# Mail configuration (use 'properties' so Roller reads mail.* keys)
mail.configurationType=properties
mail.hostname=smtp.gmail.com
mail.port=587

# SMTP credentials loaded from environment variables (MAIL_USERNAME / MAIL_PASSWORD).
mail.username=${env.MAIL_USERNAME}
mail.password=${env.MAIL_PASSWORD}

# SMTP runtime flags
mail.smtp.auth=true
mail.smtp.starttls.enable=true
mail.smtp.ssl.trust=smtp.gmail.com
mail.smtp.ssl.protocols=TLSv1.2

# Debug flag (set true only for local troubleshooting)
mail.debug=false